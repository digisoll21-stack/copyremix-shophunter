services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - LEMON_SQUEEZY_API_KEY=${LEMON_SQUEEZY_API_KEY}
      - LEMON_SQUEEZY_STORE_ID=${LEMON_SQUEEZY_STORE_ID}
      - LEMON_SQUEEZY_WEBHOOK_SECRET=${LEMON_SQUEEZY_WEBHOOK_SECRET}
      - LEMON_SQUEEZY_VARIANT_ID_STARTER=${LEMON_SQUEEZY_VARIANT_ID_STARTER}
      - LEMON_SQUEEZY_VARIANT_ID_PRO=${LEMON_SQUEEZY_VARIANT_ID_PRO}
      - LEMON_SQUEEZY_VARIANT_ID_SCALE=${LEMON_SQUEEZY_VARIANT_ID_SCALE}
    restart: always
